  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

GIN*/{\n  \"theme\": \"light\",\n  \"accent\": \"cobalt\"\n}/*EDITMODE-END*/;\n<\u002Fscript>\n<style>\n  :root{\n    --ink:#0f0f0e;\n    --paper:#f4f1ea;\n    --paper-2:#eeeae1;\n    --muted: rgba(15,15,14,0.5);\n    --rule: rgba(15,15,14,0.12);\n    --accent: #0f0f0e;\n    --display: \"JetBrains Mono\", ui-monospace, monospace;\n    --mono: \"JetBrains Mono\", ui-monospace, monospace;\n    --sans: \"Inter\", -apple-system, BlinkMacSystemFont, sans-serif;\n  }\n  html[data-theme=\"dark\"]{\n    --ink:#f4f1ea; --paper:#0f0f0e; --paper-2:#181715;\n    --muted: rgba(244,241,234,0.5); --rule: rgba(244,241,234,0.12);\n  }\n  html[data-accent=\"ink\"]{ --accent: var(--ink) }\n  html[data-accent=\"amber\"]{ --accent: oklch(0.74 0.14 55) }\n  html[data-accent=\"rust\"]{ --accent: oklch(0.58 0.17 35) }\n  html[data-accent=\"moss\"]{ --accent: oklch(0.55 0.09 140) }\n  html[data-accent=\"cobalt\"]{ --accent: oklch(0.46 0.19 255) }\n\n  /* Accent usage when non-ink accent is active */\n  html:not([data-accent=\"ink\"]) em{ color: var(--accent) }\n  html:not([data-accent=\"ink\"]) .hero .eyebrow{ color: var(--accent) }\n  html:not([data-accent=\"ink\"]) .manifesto .track .dot{ background: var(--accent) }\n  html:not([data-accent=\"ink\"]) .moment .kicker{ color: var(--accent) }\n  html:not([data-accent=\"ink\"]) .agent-row .idx{ color: var(--accent) }\n  html:not([data-accent=\"ink\"]) .phase-row .no{ color: var(--accent) }\n  html:not([data-accent=\"ink\"]) .engine .kicker{ color: color-mix(in srgb, var(--accent) 80%, var(--paper)) }\n  html:not([data-accent=\"ink\"]) .closer .btn-primary{ background: var(--accent); border-color: var(--accent) }\n  html:not([data-accent=\"ink\"]) .closer .btn-link{ border-bottom-color: var(--accent); color: var(--accent) }\n\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{\n    background:var(--paper); color:var(--ink);\n    font-family:var(--sans); font-size:16px; line-height:1.5;\n    -webkit-font-smoothing:antialiased;\n    overflow-x:hidden;\n  }\n  a{color:inherit; text-decoration:none}\n  img{max-width:100%; display:block}\n\n  /* Shared ------- */\n  .wrap{ padding-left: clamp(32px, 8vw, 140px); padding-right: clamp(32px, 8vw, 140px); }\n  .mono{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.22em; color: var(--muted) }\n  .mono.ink{ color: var(--ink) }\n\n  /* ---------- Nav ---------- */\n  nav.top{\n    position:sticky; top:0; z-index:40;\n    display:flex; align-items:center; justify-content:space-between;\n    padding-top:28px; padding-bottom:28px;\n    padding-left: clamp(32px, 8vw, 140px); padding-right: clamp(32px, 8vw, 140px);\n    background: color-mix(in srgb, var(--paper) 88%, transparent);\n    backdrop-filter: blur(10px);\n  }\n  nav.top .brand{ display:flex; align-items:center }\n  nav.top .brand img{ height:42px; width: auto; display: block }\n  nav.top ul{ list-style:none; display:flex; gap:36px; margin:0; padding:0; }\n  nav.top ul a{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.2em; color:var(--muted)}\n  nav.top ul a:hover{ color: var(--ink)}\n  nav.top .cta{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.2em; color: var(--ink); border-bottom:1px solid var(--ink); padding-bottom:3px}\n\n  /* ---------- HERO ---------- */\n  .hero{\n    min-height: 92vh;\n    display:grid;\n    grid-template-rows: 1fr auto;\n    padding-top: clamp(40px, 7vw, 120px);\n    padding-bottom: clamp(60px, 10vw, 120px);\n    padding-left: clamp(32px, 8vw, 140px);\n    padding-right: clamp(32px, 8vw, 140px);\n    position:relative;\n  }\n  .hero .eyebrow{ margin-bottom: clamp(40px, 6vw, 80px)}\n  .hero h1{\n    font-family: var(--display);\n    font-weight: 400;\n    font-size: clamp(44px, 7.5vw, 132px);\n    line-height: 0.95;\n    letter-spacing: -0.025em;\n    margin:0;\n    max-width: 18ch;\n    text-wrap: balance;\n  }\n  .hero h1 em{ font-style: italic; }\n  .hero .footer-row{\n    margin-top: clamp(80px, 12vw, 180px);\n    display:grid;\n    grid-template-columns: repeat(3, max-content);\n    justify-content: space-between;\n    gap: 40px;\n    align-items: end;\n    padding-top: 28px;\n    border-top: 1px solid var(--rule);\n  }\n  .hero .footer-row .k{ font-family: var(--mono); font-size:10px; letter-spacing: 0.22em; text-transform:uppercase; color: var(--muted); margin-bottom: 14px}\n  .hero .footer-row .v{ font-family: var(--display); font-size: clamp(22px, 2.6vw, 32px); line-height:1.15; letter-spacing:-0.01em}\n  @media(max-width: 900px){ .hero .footer-row{ grid-template-columns: 1fr; gap:32px } }\n\n  /* ---------- Manifesto Marquee ---------- */\n  .manifesto{\n    border-top: 1px solid var(--rule);\n    border-bottom: 1px solid var(--rule);\n    padding: clamp(40px, 6vw, 80px) 0;\n    overflow: hidden;\n    background: var(--paper-2);\n  }\n  .manifesto .track{\n    display:flex; gap: 4rem;\n    white-space: nowrap;\n    font-family: var(--display);\n    font-size: clamp(44px, 8vw, 128px);\n    line-height: 1;\n    letter-spacing: -0.02em;\n    animation: v2marq 55s linear infinite;\n    width: max-content;\n  }\n  .manifesto .track span{ display: inline-flex; align-items: center; gap: 4rem }\n  .manifesto .track .dot{ width: 12px; height:12px; border-radius: 50%; background: var(--ink); flex: none; display:inline-block }\n  @keyframes v2marq { from{ transform: translateX(0) } to{ transform: translateX(-50%) } }\n\n  /* ---------- Word Mark (moment) ---------- */\n  .moment{\n    padding-top: clamp(120px, 20vw, 280px);\n    padding-bottom: clamp(120px, 20vw, 280px);\n    padding-left: clamp(32px, 8vw, 140px);\n    padding-right: clamp(32px, 8vw, 140px);\n    text-align:center;\n    border-top:1px solid var(--rule);\n    border-bottom:1px solid var(--rule);\n  }\n  .moment .kicker{ margin-bottom: clamp(40px, 6vw, 70px)}\n  .moment .big{\n    font-family: var(--display); font-weight:400;\n    font-size: clamp(24px, 3.2vw, 52px);\n    line-height: 1.2; letter-spacing: -0.01em;\n    max-width: 38ch; margin: 0 auto;\n    text-wrap: balance;\n  }\n  .moment .big em{ font-style:italic }\n\n  /* ---------- Three (cards per viewport) ---------- */\n  .agents{ padding-top: clamp(140px, 18vw, 240px); padding-bottom: clamp(140px, 18vw, 240px) }\n  .agents > .head{\n    margin-bottom: clamp(100px, 14vw, 180px);\n    max-width: 60vw;\n  }\n  .agents > .head h2{\n    font-family: var(--display); font-weight:400;\n    font-size: clamp(44px, 7vw, 112px); line-height:0.98; letter-spacing:-0.02em;\n    margin: 20px 0 0; text-wrap: balance;\n  }\n  .agents > .head .lede{\n    font-family: var(--sans);\n    font-size: 18px; line-height: 1.55;\n    margin: clamp(32px, 4vw, 56px) 0 0;\n    max-width: 56ch;\n    color: var(--ink);\n  }\n  .agent-row{\n    display:grid; grid-template-columns: minmax(100px, 0.5fr) 1fr 1fr;\n    gap: clamp(24px, 4vw, 80px);\n    padding: clamp(70px, 9vw, 130px) 0;\n    border-top: 1px solid var(--rule);\n    align-items: start;\n  }\n  .agent-row:last-child{ border-bottom: 1px solid var(--rule) }\n  .agent-row .idx{ font-family: var(--mono); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color: var(--muted)}\n  .agent-row .title{ font-family: var(--display); font-size: clamp(40px, 5.5vw, 84px); line-height:0.98; letter-spacing:-0.02em; margin:0 }\n  .agent-row .title em{ font-style:italic }\n  .agent-row .sub{ margin-top: 22px; font-family: var(--mono); font-size:11px; text-transform:uppercase; letter-spacing: 0.2em; color: var(--muted) }\n  .agent-row .desc{ margin:0; font-size: 18px; line-height:1.55; max-width: 42ch; color: var(--ink)}\n  @media (max-width: 900px){\n    .agent-row{ grid-template-columns: 1fr; gap: 18px; padding: 60px 0 }\n  }\n\n  /* ---------- Engine ---------- */\n  .engine{\n    background: var(--ink); color: var(--paper);\n    padding: clamp(140px, 20vw, 260px) clamp(32px, 8vw, 140px);\n    position:relative; overflow:hidden;\n  }\n  .engine .block{ max-width: 70vw; position:relative; z-index:2}\n  .engine h2{\n    font-family: var(--display); font-weight:400;\n    font-size: clamp(44px, 7vw, 120px); line-height: 1; letter-spacing:-0.02em;\n    margin: 24px 0 0; text-wrap: balance;\n  }\n  .engine h2 em{ font-style:italic; }\n  .engine .kicker{ color: color-mix(in srgb, var(--paper) 55%, transparent)}\n  .engine .logo-mark{\n    position:absolute; right: clamp(32px, 8vw, 140px); top: clamp(140px, 20vw, 260px);\n    width: min(24vw, 220px); height:auto; opacity: 0.9;\n  }\n  @media (max-width: 900px){\n    .engine .logo-mark{ position:static; transform:none; width:120px; margin-top:60px; opacity:0.7}\n    .engine .capabilities{ margin-top: 80px }\n  }\n\n  .engine .capabilities{\n    position: relative; z-index: 2;\n    margin-top: clamp(100px, 14vw, 180px);\n    padding-top: clamp(40px, 6vw, 70px);\n    border-top: 1px solid color-mix(in srgb, var(--paper) 18%, transparent);\n    display:grid; grid-template-columns: repeat(3, 1fr);\n    gap: clamp(24px, 4vw, 80px);\n  }\n  .engine .cap{ max-width: 32ch; display:flex; flex-direction: column; gap: 20px }\n  .engine .cap .cap-no{\n    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;\n    color: color-mix(in srgb, var(--paper) 50%, transparent);\n  }\n  .engine .cap h4{\n    font-family: var(--display); font-weight: 400; font-size: clamp(24px, 2.6vw, 38px);\n    line-height: 1.1; letter-spacing: -0.01em; margin: 0;\n  }\n  .engine .cap p{\n    font-family: var(--sans); font-size: 15px; line-height: 1.55; margin: 0;\n    color: color-mix(in srgb, var(--paper) 70%, transparent);\n  }\n  .engine .cap .tag{\n    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;\n    color: color-mix(in srgb, var(--paper) 55%, transparent);\n    margin-top: 8px;\n  }\n  .engine .cap .tag b{ color: var(--paper); font-weight: 500 }\n  @media(max-width: 900px){\n    .engine .capabilities{ grid-template-columns: 1fr; gap: 60px }\n  }\n\n  /* ---------- Phases (quiet) ---------- */\n  .phases{ padding-top: clamp(140px, 18vw, 240px); padding-bottom: clamp(140px, 18vw, 240px) }\n  .phases > .head{ margin-bottom: clamp(100px, 14vw, 180px); max-width: 60vw }\n  .phases > .head h2{\n    font-family: var(--display); font-weight:400;\n    font-size: clamp(44px, 7vw, 112px); line-height:0.98; letter-spacing:-0.02em;\n    margin: 20px 0 0; text-wrap: balance;\n  }\n  .phases > .head h2 em{ font-style: italic }\n  .phase-row{\n    display:grid; grid-template-columns: 140px 1fr 2fr;\n    gap: clamp(24px, 4vw, 80px);\n    padding: clamp(48px, 6vw, 80px) 0;\n    border-top: 1px solid var(--rule);\n    align-items: baseline;\n  }\n  .phase-row:last-child{ border-bottom: 1px solid var(--rule)}\n  .phase-row .no{ font-family: var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.22em; color: var(--muted)}\n  .phase-row .t{ font-family: var(--display); font-size: clamp(28px, 3.5vw, 52px); line-height:1.02; letter-spacing:-0.01em; margin:0}\n  .phase-row .d{ font-size: 16px; line-height:1.55; color: var(--ink); max-width: 48ch }\n  @media(max-width:900px){ .phase-row{ grid-template-columns: 1fr; gap:12px } }\n\n  /* ---------- Closer (CTA) ---------- */\n  .closer{\n    min-height: 90vh;\n    display:flex; flex-direction: column; justify-content: center;\n    padding: clamp(140px, 18vw, 240px) clamp(32px, 8vw, 140px);\n    border-top:1px solid var(--rule);\n  }\n  .closer h2{\n    font-family: var(--display); font-weight:400;\n    font-size: clamp(44px, 7.5vw, 132px); line-height:0.96; letter-spacing:-0.025em;\n    margin:0; max-width: 16ch; text-wrap: balance;\n  }\n  .closer h2 em{ font-style:italic; }\n  .closer .lede{\n    font-family: var(--sans); font-size: clamp(18px, 2vw, 24px);\n    line-height: 1.5; max-width: 52ch;\n    margin: clamp(32px, 4vw, 48px) 0 0;\n    color: var(--muted);\n  }\n  .closer .actions{\n    margin-top: clamp(60px, 9vw, 120px);\n    display:flex; gap: 28px; align-items:center; flex-wrap:wrap;\n  }\n  .closer .btn-primary{\n    font-family: var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:0.2em;\n    background: var(--ink); color: var(--paper); padding: 22px 34px; border-radius:999px;\n    display:inline-flex; gap:14px; align-items:center; border: 1px solid var(--ink);\n    transition: transform .3s;\n  }\n  .closer .btn-primary:hover{ transform: translateY(-2px)}\n  .closer .btn-primary .arrow{ transition: transform .3s}\n  .closer .btn-primary:hover .arrow{ transform: translateX(5px)}\n  .closer .btn-link{\n    font-family: var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:0.2em;\n    border-bottom: 1px solid var(--ink); padding-bottom: 4px;\n  }\n\n  /* ---------- Footer ---------- */\n  footer{\n    background: var(--ink); color: var(--paper);\n    padding: clamp(80px, 10vw, 140px) clamp(32px, 8vw, 140px) 40px;\n    border-top: 1px solid var(--rule);\n  }\n  footer .top{\n    display:grid; grid-template-columns: 1.4fr auto; gap: 60px; justify-content: space-between;\n    padding-bottom: 60px;\n  }\n  footer .top img{ max-width: 260px; width: 100%}\n  footer h5{ font-family: var(--mono); font-size: 10px; letter-spacing:0.22em; text-transform:uppercase; color: color-mix(in srgb, var(--paper) 50%, transparent); margin: 0 0 16px; font-weight:500}\n  footer ul{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap: 12px }\n  footer ul a{ font-size: 15px; color: var(--paper); }\n  footer ul a:hover{ opacity: 0.6 }\n  footer .bottom{\n    display:flex; justify-content: space-between;\n    padding-top: 24px; border-top: 1px solid color-mix(in srgb, var(--paper) 18%, transparent);\n    font-family: var(--mono); font-size:10px; text-transform: uppercase; letter-spacing:0.22em; color: color-mix(in srgb, var(--paper) 50%, transparent);\n    flex-wrap:wrap; gap: 16px;\n  }\n  @media(max-width:900px){ footer .top{ grid-template-columns: 1fr } }\n\n  /* reveal */\n  .reveal{ opacity:0; transform: translateY(24px); transition: opacity 1s ease, transform 1s ease}\n  .reveal.in{ opacity:1; transform:none }\n\n  /* Tweaks */\n  #tweaks{\n    position: fixed; bottom:20px; right:20px; z-index:100;\n    background: var(--paper); color: var(--ink); border: 1px solid var(--ink);\n    padding: 18px; width: 240px; font-family: var(--mono); font-size: 10px; text-transform:uppercase; letter-spacing:0.14em;\n    display:none; border-radius: 4px;\n    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.25);\n  }\n  #tweaks.on{ display: block }\n  #tweaks h6{ margin: 0 0 10px; color: var(--muted); font-weight:500; font-size: 10px; letter-spacing:0.2em}\n  #tweaks .group{ display:flex; flex-wrap:wrap; gap: 6px; margin-bottom: 14px }\n  #tweaks button{\n    font-family:var(--mono); font-size: 9px; text-transform:uppercase; letter-spacing:0.14em;\n    background: transparent; color: var(--ink); border: 1px solid var(--rule);\n    padding: 7px 10px; border-radius:2px; cursor: pointer;\n  }\n  #tweaks button.on{ background: var(--ink); color: var(--paper); border-color: var(--ink)}\n\n  /* ---------- Mobile refinements ---------- */\n  @media(max-width: 720px){\n    nav.top{\n      padding-top: 18px; padding-bottom: 18px;\n      padding-left: 20px; padding-right: 20px;\n    }\n    nav.top .brand img{ height: 32px }\n    nav.top ul{ display: none }\n    nav.top .cta{ font-size: 10px; letter-spacing: 0.18em }\n\n    #modal-backdrop{ padding: 0; align-items: flex-end }\n    #modal-backdrop .dialog{\n      width: 100%;\n      max-height: 92vh;\n      padding: 40px 24px 28px;\n      border-left: none; border-right: none; border-bottom: none;\n    }\n    #modal-backdrop .close{ top: 14px; right: 14px; font-size: 10px }\n    #modal-backdrop h3{ font-size: 32px }\n    #modal-backdrop .submit{ width: 100%; justify-content: center; padding: 18px 20px }\n  }\n\n  /* ---------- Contact Modal ---------- */\n  #modal-backdrop{\n    position: fixed; inset: 0; background: color-mix(in srgb, var(--ink) 70%, transparent);\n    backdrop-filter: blur(8px); z-index: 200;\n    display: none; align-items: center; justify-content: center;\n    padding: 24px;\n    opacity: 0; transition: opacity .3s ease;\n  }\n  #modal-backdrop.on{ display: flex; opacity: 1 }\n  #modal-backdrop .dialog{\n    background: var(--paper); color: var(--ink);\n    width: min(560px, 100%);\n    max-height: 92vh; overflow-y: auto;\n    padding: clamp(32px, 5vw, 64px);\n    border: 1px solid var(--ink);\n    position: relative;\n    transform: translateY(12px); transition: transform .35s ease;\n  }\n  #modal-backdrop.on .dialog{ transform: none }\n  #modal-backdrop .close{\n    position: absolute; top: 20px; right: 20px;\n    background: transparent; border: none; cursor: pointer;\n    font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;\n    color: var(--muted); padding: 4px;\n  }\n  #modal-backdrop .close:hover{ color: var(--ink) }\n  #modal-backdrop .kicker{\n    font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em;\n    color: var(--muted); margin-bottom: 20px;\n  }\n  #modal-backdrop h3{\n    font-family: var(--display); font-weight: 400;\n    font-size: clamp(32px, 4.5vw, 52px); line-height: 1; letter-spacing: -0.02em;\n    margin: 0 0 12px; text-wrap: balance;\n  }\n  #modal-backdrop h3 em{ font-style: italic; color: var(--accent) }\n  #modal-backdrop .lede{\n    font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0 0 36px;\n    max-width: 42ch;\n  }\n  #modal-backdrop form{ display: flex; flex-direction: column; gap: 22px }\n  #modal-backdrop label{\n    display: flex; flex-direction: column; gap: 8px;\n    font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em;\n    color: var(--muted);\n  }\n  #modal-backdrop input,\n  #modal-backdrop textarea{\n    font-family: var(--sans); font-size: 16px; color: var(--ink);\n    background: transparent; border: none; border-bottom: 1px solid var(--rule);\n    padding: 10px 0; outline: none;\n    transition: border-color .2s;\n  }\n  #modal-backdrop textarea{ resize: vertical; min-height: 80px; line-height: 1.5 }\n  #modal-backdrop input:focus,\n  #modal-backdrop textarea:focus{ border-bottom-color: var(--ink) }\n  #modal-backdrop .submit{\n    align-self: flex-start;\n    margin-top: 12px;\n    font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em;\n    background: var(--ink); color: var(--paper);\n    padding: 18px 28px; border-radius: 999px; border: 1px solid var(--ink);\n    cursor: pointer;\n    display: inline-flex; align-items: center; gap: 14px;\n    transition: transform .3s;\n  }\n  html:not([data-accent=\"ink\"]) #modal-backdrop .submit{ background: var(--accent); border-color: var(--accent) }\n  #modal-backdrop .submit:hover{ transform: translateY(-2px) }\n  #modal-backdrop .submit .arrow{ transition: transform .3s }\n  #modal-backdrop .submit:hover .arrow{ transform: translateX(5px) }\n  #modal-backdrop .success{\n    text-align: left; padding: 12px 0;\n  }\n  #modal-backdrop .success h3{ margin-bottom: 16px }\n  #modal-backdrop .success p{ font-size: 15px; line-height: 1.55; color: var(--muted); margin: 0 }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<nav class=\"top\">\n  <a class=\"brand\" href=\"#\">\n    <img id=\"brandmark\" alt=\"Truebourne\">\n  <\u002Fa>\n  <ul>\n    <li><a href=\"#platform\">Platform<\u002Fa><\u002Fli>\n    <li><a href=\"#program\">AI Transformation<\u002Fa><\u002Fli>\n    <li><a href=\"#engine\">Engine<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <a class=\"cta\" href=\"#contact\">Contact<\u002Fa>\n<\u002Fnav>\n\n<!-- ========== HERO ========== -->\n<section class=\"hero\">\n  <div>\n    <div class=\"mono eyebrow\">Cortex · The AI-Native Enterprise Platform<\u002Fdiv>\n    <h1 class=\"reveal\">AI-Native Platform.<br><em>Enterprise Ready<\u002Fem> Agents.<br>One Learning<br>System.<\u002Fh1>\n  <\u002Fdiv>\n  <div class=\"footer-row\">\n    <div>\n      <div class=\"k\">Creative Cortex<\u002Fdiv>\n      <div class=\"v\">Live, May 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"k\">Full platform<\u002Fdiv>\n      <div class=\"v\">June 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"k\">Founding customers<\u002Fdiv>\n      <div class=\"v\">Open now<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== MANIFESTO ========== -->\n<section class=\"manifesto\" aria-label=\"Manifesto\">\n  <div class=\"track\">\n    <span>Configure<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Extend<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Evolve<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Configure<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Extend<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Evolve<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Configure<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Extend<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>Evolve<span class=\"dot\"><\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== MOMENT ========== -->\n<section class=\"moment\">\n  <div class=\"mono kicker\">What Cortex is<\u002Fdiv>\n  <h2 class=\"big reveal\">AI-powered creative production, natural-language business intelligence, and autonomous workflow automation. All in a single platform that learns your organization and compounds with every interaction.<\u002Fh2>\n<\u002Fsection>\n\n<!-- ========== AGENTS ========== -->\n<section id=\"platform\" class=\"agents wrap\">\n  <div class=\"head reveal\">\n    <div class=\"mono\">01 — Platform<\u002Fdiv>\n    <h2>Three agents, more coming.<br>One <em>learning<\u002Fem> platform.<\u002Fh2>\n    <p class=\"lede\">Each Cortex agent ships with out-of-the-box capability. Truebourne configures, extends, and evolves it around your organisation. The platform you start with is the least capable version you will ever use.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"agent-row reveal\">\n    <div class=\"idx\">01 / Creative<\u002Fdiv>\n    <div>\n      <h3 class=\"title\"><em>Creative<\u002Fem> Cortex<\u002Fh3>\n      <div class=\"sub\">Live · May 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"desc\">Brand-aware image and video generation. Your brand guide drives every output, applied automatically across all teams.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"agent-row reveal\">\n    <div class=\"idx\">02 / Semantic<\u002Fdiv>\n    <div>\n      <h3 class=\"title\"><em>Semantic<\u002Fem> Cortex<\u002Fh3>\n      <div class=\"sub\">June 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"desc\">Ask any business question in natural language. Validated answers from your live data. No SQL, no waiting.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"agent-row reveal\">\n    <div class=\"idx\">03 / Agent<\u002Fdiv>\n    <div>\n      <h3 class=\"title\"><em>Agent<\u002Fem> Cortex<\u002Fh3>\n      <div class=\"sub\">June–July 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"desc\">Conversational in Slack and Teams. Trust-scored execution, high-confidence work runs autonomously, exceptions surface for review.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== ENGINE ========== -->\n<section id=\"engine\" class=\"engine\">\n  <div class=\"block\">\n    <div class=\"mono kicker\">02 — Intelligence<\u002Fdiv>\n    <h2>Value that <em>compounds<\u002Fem> with every interaction.<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"capabilities reveal\">\n    <div class=\"cap\">\n      <div class=\"cap-no\">Capability 01<\u002Fdiv>\n      <h4>Dedicated stack available<\u002Fh4>\n      <p>No co-tenancy. A sovereign stack for regulated, data-sensitive enterprises.<\u002Fp>\n      <div class=\"tag\"><b>No co-tenancy<\u002Fb> · Sovereign<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cap\">\n      <div class=\"cap-no\">Capability 02<\u002Fdiv>\n      <h4>Digital twin with semantic layer<\u002Fh4>\n      <p>A live model of your organisation that every agent reasons against. Automation, MCP live, API integration.<\u002Fp>\n      <div class=\"tag\"><b>Automation<\u002Fb> · MCP · API<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cap\">\n      <div class=\"cap-no\">Capability 03<\u002Fdiv>\n      <h4>Foundational base metrics<\u002Fh4>\n      <p>1,100+ metrics available day one across nine verticals. Truebourne adds custom metrics from day one.<\u002Fp>\n      <div class=\"tag\"><b>1,100+ metrics<\u002Fb> · Custom, Day 1<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== PHASES ========== -->\n<section id=\"program\" class=\"phases wrap\">\n  <div class=\"head reveal\">\n    <div class=\"mono\">03 — AI Transformation<\u002Fdiv>\n    <h2><em>Collaboration<\u002Fem> every step of the way<\u002Fh2>\n  <\u002Fdiv>\n\n  <div class=\"phase-row reveal\">\n    <div class=\"no\">Phase 01<\u002Fdiv>\n    <h4 class=\"t\">Discovery<\u002Fh4>\n    <p class=\"d\">Stakeholder interviews, technology audit, workflow mapping, and a scored opportunity matrix.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"phase-row reveal\">\n    <div class=\"no\">Phase 02<\u002Fdiv>\n    <h4 class=\"t\">Strategy<\u002Fh4>\n    <p class=\"d\">Transformation strategy, architecture, and a quantified business case, fueled by Phase 1 findings.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"phase-row reveal\">\n    <div class=\"no\">Phase 03<\u002Fdiv>\n    <h4 class=\"t\">Pilot<\u002Fh4>\n    <p class=\"d\">Priority use cases deployed on Cortex or your preferred enterprise AI stack. First measurable outcomes delivered and validated.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"phase-row reveal\">\n    <div class=\"no\">Phase 04<\u002Fdiv>\n    <h4 class=\"t\">Scale<\u002Fh4>\n    <p class=\"d\">Expansion across teams. The platform deepens its knowledge of your organisation. We remain your partner.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== CLOSER ========== -->\n<section id=\"contact\" class=\"closer\">\n  <div class=\"mono reveal\" style=\"margin-bottom:28px\">04 — Begin<\u002Fdiv>\n  <h2 class=\"reveal\">Begin your <em>enterprise AI transformation<\u002Fem>.<\u002Fh2>\n  <p class=\"lede reveal\">A Discovery conversation to identify where Cortex can deliver the fastest, most measurable impact — on your real data.<\u002Fp>\n  <div class=\"actions reveal\">\n    <a class=\"btn-primary\" href=\"#contact\" data-open-contact=\"\">Start the conversation <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== FOOTER ========== -->\n<footer>\n  <div class=\"top\">\n    <img id=\"footerMark\" alt=\"Truebourne\">\n    <div>\n      <h5>Contact<\u002Fh5>\n      <ul>\n        <li><a href=\"#contact\">Start the conversation<\u002Fa><\u002Fli>\n        <li><a href=\"mailto:hello@truebourne.ai\">hello@truebourne.ai<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"bottom\">\n    <div>© 2026 Truebourne, LLC<\u002Fdiv>\n    <div>Cortex · The AI-Native Enterprise Platform<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Contact Modal -->\n<div id=\"modal-backdrop\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modal-title\">\n  <div class=\"dialog\">\n    <button class=\"close\" data-close=\"\">Close ✕<\u002Fbutton>\n    <div class=\"form-view\">\n      <div class=\"kicker\">Start the conversation<\u002Fdiv>\n      <h3 id=\"modal-title\">Begin the <em>Discovery<\u002Fem>.<\u002Fh3>\n      <form id=\"contact-form\" action=\"https://formspree.io/f/mwvaarvl\" method=\"POST\" novalidate=\"\">\n        <label>Name\n          <input type=\"text\" name=\"name\" required=\"\" autocomplete=\"name\">\n        <\u002Flabel>\n        <label>Email\n          <input type=\"email\" name=\"email\" required=\"\" autocomplete=\"email\">\n        <\u002Flabel>\n        <label>Reason for inquiry\n          <textarea name=\"reason\" rows=\"3\" required=\"\" placeholder=\"What would you like to explore?\"><\u002Ftextarea>\n        <\u002Flabel>\n        <button type=\"submit\" class=\"submit\">Send <span class=\"arrow\">→<\u002Fspan><\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n    <div class=\"success\" style=\"display:none\">\n      <div class=\"kicker\">Received<\u002Fdiv>\n      <h3>Thank you.<\u002Fh3>\n      <p>We've got your note. A member of the Truebourne team will be in touch within two business days.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div id=\"tweaks\">\n  <h6>Theme<\u002Fh6>\n  <div class=\"group\" data-key=\"theme\">\n    <button data-val=\"light\">Light<\u002Fbutton>\n    <button data-val=\"dark\">Dark<\u002Fbutton>\n  <\u002Fdiv>\n  <h6>Accent<\u002Fh6>\n  <div class=\"group\" data-key=\"accent\">\n    <button data-val=\"ink\">Ink<\u002Fbutton>\n    <button data-val=\"cobalt\">Cobalt<\u002Fbutton>\n    <button data-val=\"amber\">Amber<\u002Fbutton>\n    <button data-val=\"rust\">Rust<\u002Fbutton>\n    <button data-val=\"moss\">Moss<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function(){\n  function apply(t){\n    document.documentElement.dataset.theme = t.theme;\n    document.documentElement.dataset.accent = t.accent;\n    const logo = document.getElementById('brandmark');\n    if(logo) logo.src = t.theme === 'dark' ? window.WORDMARK_WHITE : window.WORDMARK_BLACK;\n    const engM = document.getElementById('engineMark');\n    if(engM) engM.src = window.ICON_WHITE;\n    const f = document.getElementById('footerMark');\n    if(f) f.src = window.WORDMARK_WHITE;\n    document.querySelectorAll('#tweaks .group').forEach(g=>{\n      const k = g.dataset.key;\n      g.querySelectorAll('button').forEach(b=> b.classList.toggle('on', b.dataset.val === t[k]));\n    });\n  }\n  apply(TWEAKS);\n  document.querySelectorAll('#tweaks .group').forEach(g=>{\n    g.addEventListener('click', e=>{\n      const b = e.target.closest('button'); if(!b) return;\n      TWEAKS[g.dataset.key] = b.dataset.val; apply(TWEAKS);\n      try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[g.dataset.key]: b.dataset.val}}, '*'); }catch(e){}\n    });\n  });\n  window.addEventListener('message', e=>{\n    const d=e.data||{};\n    if(d.type==='__activate_edit_mode') document.getElementById('tweaks').classList.add('on');\n    if(d.type==='__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');\n  });\n  try{ window.parent.postMessage({type:'__edit_mode_available'}, '*')}catch(e){}\n\n  const io = new IntersectionObserver(es=>es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target)}}), {threshold: 0.1});\n  document.querySelectorAll('.reveal').forEach(el=> io.observe(el));\n})();\n<\u002Fscript>\n<script>\n(function(){\n  const backdrop = document.getElementById('modal-backdrop');\n  const form = document.getElementById('contact-form');\n  const formView = backdrop.querySelector('.form-view');\n  const successView = backdrop.querySelector('.success');\n\n  function open(){\n    formView.style.display='';\n    successView.style.display='none';\n    form.reset();\n    backdrop.classList.add('on');\n    document.body.style.overflow='hidden';\n    setTimeout(()=> backdrop.querySelector('input[name=\"name\"]').focus(), 100);\n  }\n  function close(){\n    backdrop.classList.remove('on');\n    document.body.style.overflow='';\n  }\n\n  // Wire any link pointing at #contact, plus explicit openers\n  document.querySelectorAll('a[href=\"#contact\"], [data-open-contact]').forEach(el=>{\n    el.addEventListener('click', e=>{ e.preventDefault(); open(); });\n  });\n\n  backdrop.addEventListener('click', e=>{\n    if(e.target === backdrop || e.target.closest('[data-close]')) close();\n  });\n  document.addEventListener('keydown', e=>{\n    if(e.key === 'Escape' && backdrop.classList.contains('on')) close();\n  });\n\n  form.addEventListener('submit', async (e) => {\n    e.preventDefault();\n    if (!form.checkValidity()) { form.reportValidity(); return; }\n\n    const submitBtn = form.querySelector('.submit');\n    const originalText = submitBtn.innerHTML;\n    submitBtn.disabled = true;\n    submitBtn.innerHTML = 'Sending...';\n\n    try {\n      const response = await fetch(form.action, {\n        method: 'POST',\n        body: new FormData(form),\n        headers: { 'Accept': 'application/json' }\n      });\n\n      if (response.ok) {\n        formView.style.display = 'none';\n        successView.style.display = 'block';\n      } else {\n        const data = await response.json().catch(() => ({}));\n        const msg = data.errors?.map(err => err.message).join(', ') || 'Something went wrong. Please try again or email hello@truebourne.ai directly.';\n        alert(msg);\n        submitBtn.disabled = false;\n        submitBtn.innerHTML = originalText;\n      }\n    } catch (err) {\n      alert('Network error. Please try again or email hello@truebourne.ai directly.');\n      submitBtn.disabled = false;\n      submitBtn.innerHTML = originalText;\n    }\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
